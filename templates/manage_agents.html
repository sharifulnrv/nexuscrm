{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Add New Agent</h4>
            <form method="POST">
                <input type="hidden" name="Role" value="Agent">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="Name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="Username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Phone</label>
                    <input type="text" name="Phone" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Active Agents</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Phone</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for agent in agents %}
                        <tr>
                            <td>{{ agent.Name }}</td>
                            <td>{{ agent.Username }}</td>
                            <td>{{ agent.Phone }}</td>
                            <td class="text-end">
                                <div class="btn-group">
                                    <a href="{{ url_for('dashboard.edit_agent', username=agent.Username) }}" class="btn btn-xs btn-light border px-2" title="Edit Agent">
                                        <i class="fas fa-edit text-primary me-1"></i> Edit
                                    </a>
                                    <a href="{{ url_for('dashboard.delete_agent', username=agent.Username) }}" class="btn btn-xs btn-light border px-2 text-danger" onclick="return confirm('Are you sure?')" title="Delete Agent">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

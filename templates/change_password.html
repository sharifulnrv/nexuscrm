{% extends "layout.html" %}

{% block content %}
<div class="row align-items-center justify-content-center page-transition" style="min-height: 70vh;">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card border-0 shadow-md rounded-lg overflow-hidden">
            <div class="bg-primary p-4 p-md-5 text-center text-white position-relative">
                <div class="position-absolute top-0 start-0 w-100 h-100 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 24px 24px;"></div>
                <div class="avatar-lg bg-white bg-opacity-20 rounded-circle mx-auto mb-3 d-grid place-items-center shadow-lg" style="width: 80px; height: 80px;">
                    <i class="fas fa-key fa-2x"></i>
                </div>
                <h3 class="fw-800 mb-1 letter-tight">Update Credentials</h3>
                <p class="opacity-75 mb-0 small fw-medium">Secure your professional NexusCRM instance</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase mb-2" style="font-size: 0.65rem; letter-spacing: 0.05em;">Current Security Key</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0 px-3"><i class="fas fa-lock-open text-muted opacity-50"></i></span>
                            <input type="password" name="old_password" class="form-control bg-light border-0 fs-6 fw-medium" placeholder="Current password" required autofocus>
                        </div>
                    </div>
                    
                    <hr class="my-4 opacity-5">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase mb-2" style="font-size: 0.65rem; letter-spacing: 0.05em;">New Security Key</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0 px-3"><i class="fas fa-shield-alt text-muted opacity-50"></i></span>
                            <input type="password" name="new_password" class="form-control bg-light border-0 fs-6" placeholder="Minimum 6 characters" required>
                        </div>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-bold text-muted small text-uppercase mb-2" style="font-size: 0.65rem; letter-spacing: 0.05em;">Verify New Key</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0 px-3"><i class="fas fa-check-circle text-muted opacity-50"></i></span>
                            <input type="password" name="confirm_password" class="form-control bg-light border-0 fs-6" placeholder="Repeat new password" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg py-3 shadow-md fw-800">
                            UPDATE SECURITY <i class="fas fa-save ms-2 opacity-50"></i>
                        </button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-link text-muted smaller text-decoration-none mt-2">
                            Return to Intelligence Overview
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
